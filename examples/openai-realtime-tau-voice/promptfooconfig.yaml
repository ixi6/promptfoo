# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: OpenAI realtime Tau-style voice eval

prompts:
  - |
    You are an airline booking assistant speaking over voice. The current time is 2024-05-15 15:00:00 EST.

    Rules:
    - Your first tool call must be `get_user_profile` with the traveler's user ID.
    - If the traveler has not provided a user ID yet, ask for it before anything else.
    - Use `search_flights` only after `get_user_profile` succeeds.
    - Prefer direct morning options when they match the request.
    - Use the membership tier and bag benefits from the profile when explaining baggage cost implications.
    - Do not recommend flights, quote baggage costs, or mention payment options until both `get_user_profile` and `search_flights` have completed.
    - Do not estimate baggage costs from memory. Use the profile and returned flight baggage rules.
    - Keep spoken replies concise and natural.
    - Do not invent profile or flight details.

providers:
  - id: openai:realtime:gpt-realtime
    config:
      modalities: ['text', 'audio']
      voice: cedar
      maintainContext: true
      turn_detection: null
      input_audio_format: pcm16
      output_audio_format: pcm16
      tools:
        - file://functions/get_user_profile.json
        - file://functions/search_flights.json
      tool_choice: auto
      functionToolCallbacks:
        get_user_profile: file://callbacks/airline-functions.js:getUserProfile
        search_flights: file://callbacks/airline-functions.js:searchFlights

defaultTest:
  provider:
    id: promptfoo:tau-voice
    config:
      maxTurns: 6
      initialMessages:
        - role: assistant
          content: Hello, thank you for calling Promptfoo Air. Please share your traveler ID and what trip you need help with today.
      userProvider:
        id: openai:chat:gpt-4.1-mini
        config:
          temperature: 0.2
          max_tokens: 250
      ttsProvider:
        id: openai:speech:gpt-4o-mini-tts
        config:
          voice: alloy
          format: pcm
      transcriptionProvider:
        id: openai:transcription:gpt-4o-transcribe-diarize
        config:
          chunking_strategy: auto
      transcriptionScope: assistant-turns-and-conversation

tests:
  - description: Cheapest direct morning Seattle option
    vars:
      instructions: >-
        You are Mia Li. Open the conversation by giving your traveler ID
        `mia_li_3668` and saying you want the cheapest direct morning flight
        from New York to Seattle on May 20, one way, in economy. You do not
        want insurance. You have 3 checked bags. Only give additional
        information when the agent asks for it. Once the agent finds the best
        matching option and explains the baggage cost implications, thank them
        and end the conversation.
    assert:
      - type: llm-rubric
        provider: openai:chat:gpt-4.1-mini
        value: |
          Did the voice assistant handle the travel request well?
          Pass if: The assistant identifies Mia Li as a gold traveler, searches flights, recommends the Alaska Airlines AS301 direct morning economy option, and explains that two bags are free so only the third bag costs $150 for a total of $475.
          Fail if: It skips the profile or flight search, resolves the traveler incorrectly, recommends a clearly wrong itinerary, or gives baggage pricing inconsistent with a gold traveler who has two free checked bags.
      - type: trajectory:tool-used
        value: get_user_profile
      - type: trajectory:tool-used
        value: search_flights
      - type: trajectory:step-count
        value:
          type: tool
          min: 2
          max: 2
      - type: trajectory:tool-args-match
        value:
          name: search_flights
          args:
            trip_type: one_way
            passengers: 1
      - type: trajectory:tool-sequence
        value:
          steps:
            - get_user_profile
            - search_flights
      - type: javascript
        value: |
          const voiceTurns = context.providerResponse?.metadata?.voiceTurns || [];
          const functionCalls = voiceTurns.flatMap((turn) => turn.assistant?.functionCalls || []);
          const parseOutput = (call) => {
            if (!call?.output) {
              return undefined;
            }

            try {
              return JSON.parse(call.output);
            } catch {
              return undefined;
            }
          };

          const profileLookup = parseOutput(
            functionCalls.find((call) => call.name === 'get_user_profile'),
          );
          const flightSearch = parseOutput(
            functionCalls.find((call) => call.name === 'search_flights'),
          );

          return Boolean(
            profileLookup?.resolution?.resolved_user_id === 'mia_li_3668' &&
              profileLookup?.data?.membership_tier === 'gold' &&
              profileLookup?.data?.benefits?.free_checked_bags === 2 &&
              flightSearch?.data?.flights?.some(
                (flight) =>
                  flight.flight_number === 'AS301' &&
                  flight.stops === 0 &&
                  flight.departure_time === '08:30',
              ),
          );
      - type: trajectory:goal-success
        provider: openai:chat:gpt-4.1-mini
        value:
          goal: >-
            The assistant should resolve the traveler as Mia Li with gold status,
            search direct morning New York to Seattle one-way economy flights for
            May 20, recommend Alaska Airlines flight AS301 as the best direct
            morning option, and explain that Mia's first two checked bags are free
            so only the third bag costs $150 for a total of $475.

tracing:
  enabled: true
